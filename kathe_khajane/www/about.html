{% extends "kathe_khajane/templates/includes/web.html" %}
{% block page_content %}
<div class="kk-app container py-5 text-white">
  <div class="row justify-content-center">
    <div class="col-lg-8">

      <h1 class="mb-4" style="color: #2274f0; font-weight: 700;">
        {{ doc.title }}
      </h1>

      <div class="about-body">
        {{ doc.body | safe }}
      </div>

      {% if doc.community_text %}
      <div class="about-body mt-3">
        {{ doc.community_text | safe }}
      </div>
      {% endif %}

    </div>
  </div>
</div>
{% endblock %}

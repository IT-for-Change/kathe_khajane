<div class="modal fade" id="filterModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content filter-panel">
      <form method="GET" action="/stories">
        <input type="hidden" name="lang" value="{{ lang }}">

        <div class="modal-header border-0">
          <h5 class="modal-title">{{ _("Filter Stories") }}</h5>
          <button type="button" class="btn-close btn-close-white"
                  data-bs-dismiss="modal"></button>
        </div>

        <div class="modal-body">
          <h6 class="mb-2">{{ _("Themes") }}</h6>
          <div class="filter-list">
            {% for t in themes %}
            <label class="filter-item d-block mb-1">
              <input type="checkbox" name="theme" value="{{ t }}"
                     {% if t in selected_themes %}checked{% endif %}>
              <span>{{ t }}</span>
            </label>
            {% endfor %}
          </div>

          <hr class="my-3">

          <h6 class="mb-2">{{ _("Duration") }}</h6>
          <select name="duration" class="form-select">
            <option value="">{{ _("All") }}</option>
            <option value="short"
              {% if selected_duration == "short" %}selected{% endif %}>
              {{ _("Short") }}
            </option>
            <option value="medium"
              {% if selected_duration == "medium" %}selected{% endif %}>
              {{ _("Medium") }}
            </option>
            <option value="long"
              {% if selected_duration == "long" %}selected{% endif %}>
              {{ _("Long") }}
            </option>
          </select>
        </div>

        <div class="modal-footer border-0">
          <button class="btn btn-primary w-100">{{ _("Apply Filters") }}</button>
        </div>
      </form>
    </div>
  </div>
</div>

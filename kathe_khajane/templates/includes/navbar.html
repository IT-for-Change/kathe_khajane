            <i class="fas fa-chevron-down" style="font-size:0.65em;"></i>
          </button>

            <a href="/help?lang=en" style="display:block;color:rgba(255,255,255,0.85);padding:8px 16px;text-decoration:none;font-size:0.92rem;">English</a>

            <a href="/help?lang=mr" style="display:block;color:rgba(255,255,255,0.85);padding:8px 16px;text-decoration:none;font-size:0.92rem;">मराठी</a>

        </div>
      </div>
    </div>


    <div id="kkNavMobile"
         style="display:none;flex-direction:column;">
      <!-- Top bar: hamburger only -->
      <div style="display:flex;align-items:center;justify-content:flex-end;height:50px;">
        <button onclick="toggleMobileMenu()"

          <span style="display:block;width:20px;height:2px;background:#fff;margin:4px 0;border-radius:1px;"></span>
          <span style="display:block;width:20px;height:2px;background:#fff;margin:4px 0;border-radius:1px;"></span>

      <!-- Collapsible menu -->
      <div id="mobileMenu"
           style="display:none;padding:0.25rem 0 0.75rem;border-top:1px solid #1e1e1e;">
        <a href="/home"
           style="display:block;color:rgba(255,255,255,0.88);padding:0.55rem 0.5rem;text-decoration:none;font-size:0.97rem;">

        </a>
        <a href="/about?lang={{ lang or 'en' }}"

<script>
// Show correct navbar based on screen width — no Bootstrap needed
function kkSetNavMode() {
  var isDesktop = window.innerWidth >= 992;
  document.getElementById('kkNavDesktop').style.display = isDesktop ? 'flex' : 'none';
  document.getElementById('kkNavMobile').style.display  = isDesktop ? 'none' : 'flex';
}
kkSetNavMode();
window.addEventListener('resize', kkSetNavMode);

// Desktop Help dropdown
function toggleDesktopHelp(e) {
  e.stopPropagation();
  var m = document.getElementById('desktopHelpMenu');
  m.style.display = m.style.display === 'none' ? 'block' : 'none';
}
document.addEventListener('click', function() {
  var m = document.getElementById('desktopHelpMenu');
  if (m) m.style.display = 'none';
});

// Mobile hamburger
function toggleMobileMenu() {
  var m = document.getElementById('mobileMenu');
  m.style.display = m.style.display === 'none' ? 'block' : 'none';
}

// Mobile Help accordion
function toggleMobileHelp() {
  var sub     = document.getElementById('mobileHelpMenu');
  var chevron = document.getElementById('mobileHelpChevron');
  var isOpen  = sub.style.display !== 'none';
  sub.style.display       = isOpen ? 'none' : 'block';
  chevron.style.transform = isOpen ? 'rotate(0deg)' : 'rotate(180deg)';
}
</script>
